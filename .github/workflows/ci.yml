name: CI

on:
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore FinancePlatform.slnx

      - name: Build
        run: dotnet build FinancePlatform.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test FinancePlatform.slnx --configuration Release --no-build --verbosity normal
